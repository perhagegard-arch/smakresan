<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smakresan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#0F1713;
    --panel:#17211B;
    --panel2:#1E2A23;
    --paper:#EFE8D8;
    --paper-dim:#A8A492;
    --gold:#C98F3D;
    --gold-soft:#8A6A34;
    --line:#2A3830;
    --done:#5E8A6A;
    --f1:#C98F3D; /* Grunden */
    --f2:#B4632F; /* Röken */
    --f3:#8E4A56; /* Sherryn */
    --f4:#5E8A6A; /* Mästarklassen */
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--forest);color:var(--paper);font-family:'Source Sans 3',sans-serif;line-height:1.55;min-height:100vh}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px 90px}

  header{padding:44px 0 10px;text-align:center}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold)}
  h1{font-family:'Libre Caslon Text',serif;font-weight:700;font-size:clamp(34px,10vw,46px);margin:8px 0 4px}
  .sub{color:var(--paper-dim);font-size:14.5px}

  .progress{margin:22px 0 6px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .progress .row{display:flex;justify-content:space-between;align-items:baseline;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--paper-dim)}
  .progress .row b{font-size:22px;color:var(--gold);font-weight:500}
  .pbar{height:6px;background:var(--line);border-radius:3px;margin-top:10px;overflow:hidden}
  .pbar div{height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));border-radius:3px;transition:width .4s ease}

  .sec-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:12px;margin:34px 0 14px}
  .sec-label::after{content:"";flex:1;height:1px;background:var(--line)}

  /* Kvällens kort */
  .tonight{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:24px 20px;position:relative;overflow:hidden}
  .tonight::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--phase,var(--gold))}
  .t-phase{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--phase,var(--gold))}
  .t-q{font-family:'Libre Caslon Text',serif;font-size:25px;line-height:1.25;margin:10px 0 12px}
  .t-bottles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .b-chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 13px 6px 7px;font-size:13.5px;font-weight:600}
  .b-dot{width:20px;height:20px;border-radius:50%;box-shadow:inset 0 -2px 4px rgba(0,0,0,.3),inset 0 1px 3px rgba(255,255,255,.3)}
  .t-why{font-size:14px;color:var(--paper-dim)}
  .btn{display:block;width:100%;margin-top:18px;border:none;border-radius:10px;padding:14px;background:linear-gradient(135deg,var(--gold-soft),var(--gold));color:#14100A;font-family:'Source Sans 3',sans-serif;font-weight:700;font-size:16px;cursor:pointer}
  .btn:focus-visible,.chip:focus-visible,.stop:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--paper)}
  .btn.small{width:auto;padding:9px 16px;font-size:13.5px;margin-top:0;display:inline-block}

  /* Resan / trail */
  .trail{position:relative;padding-left:26px}
  .trail::before{content:"";position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:var(--line)}
  .phase-h{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;margin:18px 0 8px;position:relative}
  .stop{display:block;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;color:inherit;font-family:inherit;position:relative}
  .stop::before{content:"";position:absolute;left:-22px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:var(--forest);border:2px solid var(--line)}
  .stop.done::before{background:var(--done);border-color:var(--done)}
  .stop.next::before{background:var(--gold);border-color:var(--gold)}
  .stop .s-title{font-weight:600;font-size:14.5px}
  .stop .s-meta{font-size:12px;color:var(--paper-dim);font-family:'IBM Plex Mono',monospace}
  .stop.done .s-title{color:var(--paper-dim)}
  .stop .s-score{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--done)}

  /* Provningsvy */
  .overlay{position:fixed;inset:0;background:var(--forest);z-index:10;overflow-y:auto;display:none}
  .overlay.open{display:block}
  .ov-wrap{max-width:560px;margin:0 auto;padding:20px 16px 120px}
  .ov-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .back{background:none;border:none;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer;letter-spacing:.1em}
  .glass-card{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:20px 18px;margin-bottom:14px}
  .glass-card h3{font-family:'Libre Caslon Text',serif;font-size:19px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .field{margin-bottom:14px}
  .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--paper-dim);margin-bottom:6px}
  .field input[type=text],.field textarea{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 12px;color:var(--paper);font-family:'Source Sans 3',sans-serif;font-size:15px}
  .field textarea{min-height:64px;resize:vertical}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
  .seg-row{display:flex;gap:8px}
  .seg-btn{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 0;color:var(--paper-dim);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer}
  .seg-btn.on{background:var(--gold);color:#14100A;border-color:var(--gold)}
  .stars{display:flex;gap:5px;flex-wrap:wrap}
  .star{width:34px;height:34px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--paper-dim);font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer}
  .star.on{background:var(--gold);color:#14100A;border-color:var(--gold);font-weight:500}
  .lesson{background:var(--panel2);border:1px solid var(--gold-soft);border-radius:14px;padding:20px 18px}
  .lesson h3{font-family:'Libre Caslon Text',serif;font-size:19px;margin-bottom:12px}
  .savebar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--forest) 40%);padding:24px 16px 20px;z-index:11}
  .savebar .inner{max-width:560px;margin:0 auto}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--done);color:#0F1713;font-weight:700;padding:10px 22px;border-radius:999px;font-size:14px;z-index:20;display:none}
  .toast.show{display:block;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%)}}

  /* Smakprofil */
  .prof{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .prof-row{display:grid;grid-template-columns:120px 1fr 34px;gap:10px;align-items:center;margin-bottom:9px;font-size:13.5px}
  .prof-bar{height:8px;background:var(--line);border-radius:4px;overflow:hidden}
  .prof-bar div{height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));border-radius:4px}
  .prof-val{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);text-align:right}
  .prof-empty{color:var(--paper-dim);font-size:14px;text-align:center;padding:8px 0}

  .note-hist{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:8px;font-size:13.5px}
  .note-hist .nh-t{font-weight:600;margin-bottom:4px}
  .note-hist .nh-l{color:var(--paper-dim);font-style:italic}

  .danger{margin-top:34px;text-align:center}
  .danger button{background:none;border:none;color:var(--paper-dim);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit}
  footer{margin-top:40px;text-align:center;color:var(--paper-dim);font-size:12px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Provningsprotokoll</div>
    <h1>Smakresan</h1>
    <p class="sub">14 provningar. En fråga i taget. Din gom, tränad.</p>
  </header>

  <div class="progress">
    <div class="row"><span>Genomförda provningar</span><b id="progNum">0 / 14</b></div>
    <div class="pbar"><div id="progBar" style="width:0%"></div></div>
  </div>

  <div class="sec-label">Nästa provning</div>
  <div id="tonight"></div>

  <div class="sec-label">Hela resan</div>
  <div class="trail" id="trail"></div>

  <div class="sec-label">Din smakprofil</div>
  <div class="prof" id="profile"></div>

  <div class="sec-label">Kvällarnas lärdomar</div>
  <div id="lessons"></div>

  <div class="danger"><button id="resetBtn">Nollställ all data</button></div>
  <footer>Sparas lokalt i din webbläsare · Glencairn rekommenderas 🥃</footer>
</div>

<!-- Provningsvy -->
<div class="overlay" id="overlay">
  <div class="ov-wrap" id="ovContent"></div>
  <div class="savebar"><div class="inner"><button class="btn" id="saveBtn">Spara provningen</button></div></div>
</div>
<div class="toast" id="toast">Provning sparad!</div>

<script>
const KEY = "smakresa_v1";

const BOTTLES = {
  ben:{name:"Benriach 10", color:"#DCB25E"},
  bal:{name:"Balvenie 12", color:"#DCA84E"},
  red:{name:"Redbreast 12", color:"#B8762E"},
  eli:{name:"Elijah Craig", color:"#9A4E1E"},
  tal:{name:"Talisker 10", color:"#CE9440"},
  lap:{name:"Laphroaig 10", color:"#C08A38"},
  smo:{name:"Smögen 9", color:"#E0B45C"},
  uig:{name:"Uigeadail", color:"#C87E2E"},
  abu:{name:"a'Bunadh", color:"#7A3A1C"},
  hp:{name:"Highland Park 18", color:"#B06A28"},
  dip:{name:"Diplomático", color:"#8A4A20"},
  app:{name:"Appleton 12", color:"#6E3A16"},
  x:{name:"Hemligt glas", color:"#555049"}
};

const PHASES = [
  {id:1,name:"Fas 1 · Grunden",color:"var(--f1)"},
  {id:2,name:"Fas 2 · Röken",color:"var(--f2)"},
  {id:3,name:"Fas 3 · Sherryn & djupet",color:"var(--f3)"},
  {id:4,name:"Fas 4 · Mästarklassen",color:"var(--f4)"}
];

const TASTINGS = [
  {n:1,phase:1,q:"Vad gör faten med samma stil?",bottles:["ben","bal"],
   why:"Två mjuka Speysides sida vid sida. Benriach har ny ek i mixen, Balvenie sherryfinish. Liten skillnad – perfekt för att träna näsan från start."},
  {n:2,phase:1,q:"Irland mot Kentucky – vem vinner din gom?",bottles:["red","eli"],
   why:"Irländsk pot still (krämig, kryddig) mot amerikansk bourbon (kolad ek, choklad). Största kontrasten hittills."},
  {n:3,phase:1,q:"Tre länder, tre själar – hör du skillnaden blint?",bottles:["bal","red","eli"],
   why:"Trippel! Skottland, Irland, USA. Be Maria hälla upp utan att säga vilket glas som är vilket."},
  {n:4,phase:2,q:"Vad gör röken, egentligen?",bottles:["ben","tal"],
   why:"Din norska semesterflaska mot Talisker. Samma mjuka bas – men Talisker adderar peppar, salt och rök. Nu börjar rökresan."},
  {n:5,phase:2,q:"Halv rök eller full rök – var trivs du?",bottles:["tal","lap"],
   why:"Talisker viskar rök, Laphroaig ropar. Efter ikväll vet du exakt var på rökskalan ditt hjärta bor."},
  {n:6,phase:2,q:"Kan Sverige utmana Islay?",bottles:["smo","lap"],
   why:"Hunnebostrand mot Skottlands västkust. Smögen är fruktigare bakom röken – men slår den favoriten?"},
  {n:7,phase:2,q:"Rökens två ansikten – torr eller söt?",bottles:["lap","uig"],
   why:"Båda Islay, båda rökiga. Men Laphroaig är torr och medicinsk, Uigeadail söt av sherry. Samma ö, två världar."},
  {n:8,phase:3,q:"Vad gör röken med en sherrybomb?",bottles:["abu","uig"],
   why:"Sherrymuskler i båda glasen – med och utan rök. Kör vattentestet: smaka båda före och efter några droppar."},
  {n:9,phase:3,q:"Sherrybomb mot sherryfinish – dos eller finess?",bottles:["abu","bal"],
   why:"a'Bunadh är 100 % sherryfat i fatstyrka, Balvenie bara några månaders finish. Hur mycket sherry är lagom?"},
  {n:10,phase:3,q:"Vad gör vattnet? Samma whisky, två glas.",bottles:["uig","uig"],
   why:"Häll upp Uigeadail i två glas. Vatten i det ena, inget i det andra. Vänta fem minuter. Jämför. Detta är kvällen du lär dig vattnets magi."},
  {n:11,phase:4,q:"Rommens två poler – smekning eller utmaning?",bottles:["dip","app"],
   why:"Diplomáticos sötma mot Appletons torra marmelad. Rom har samma spännvidd som whisky – ikväll bevisar du det."},
  {n:12,phase:4,q:"Fatens språk – talar bourbon och rom samma dialekt?",bottles:["app","eli"],
   why:"Båda lagrade på kolad amerikansk ek, olika råvara. Hör du fatet genom sockerröret och majsen?"},
  {n:13,phase:4,q:"Blindprovningen – känner du igen dina egna flaskor?",bottles:["x","x","x"],
   why:"Maria väljer tre flaskor i hemlighet och häller upp. Du gissar. Skriv gissningarna i anteckningarna – och sanningen efteråt."},
  {n:14,phase:4,q:"Examen – är kronjuvelen värd sitt namn?",bottles:["hp"],
   why:"Highland Park 18, solo, efter fjorton veckors tränad gom. Avsluta med att kora din topp tre – har favoriterna skiftat sen resan började?"}
];

let state = load();
function load(){
  try{const raw=localStorage.getItem(KEY);if(raw)return JSON.parse(raw)}catch(e){}
  return {sessions:{}};
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){alert("Kunde inte spara – kontrollera lagringsutrymmet.")}
}

const $=id=>document.getElementById(id);
let current=null, draft=null;

function render(){
  const doneCount=Object.keys(state.sessions).length;
  $("progNum").textContent=doneCount+" / "+TASTINGS.length;
  $("progBar").style.width=(doneCount/TASTINGS.length*100)+"%";

  const next=TASTINGS.find(t=>!state.sessions[t.n]);
  const tonight=$("tonight");
  if(next){
    const ph=PHASES.find(p=>p.id===next.phase);
    tonight.innerHTML='<div class="tonight" style="--phase:'+ph.color+'">'+
      '<div class="t-phase">'+ph.name+' · Provning '+next.n+'</div>'+
      '<div class="t-q">'+next.q+'</div>'+
      '<div class="t-bottles">'+next.bottles.map(b=>chip(b)).join("")+'</div>'+
      '<p class="t-why">'+next.why+'</p>'+
      '<button class="btn" onclick="openTasting('+next.n+')">Starta provningen</button></div>';
  } else {
    tonight.innerHTML='<div class="tonight"><div class="t-q">Resan är genomförd! 🥃</div>'+
      '<p class="t-why">Fjorton provningar, en tränad gom. Bläddra i lärdomarna nedan – och börja om när hyllan fylls på.</p></div>';
  }

  // Trail
  const trail=$("trail");trail.innerHTML="";
  PHASES.forEach(ph=>{
    const h=document.createElement("div");
    h.className="phase-h";h.style.color=ph.color;h.textContent=ph.name;
    trail.appendChild(h);
    TASTINGS.filter(t=>t.phase===ph.id).forEach(t=>{
      const s=state.sessions[t.n];
      const el=document.createElement("button");
      el.className="stop"+(s?" done":(next&&t.n===next.n?" next":""));
      el.innerHTML='<div class="s-title">'+t.n+'. '+t.q+'</div>'+
        '<div class="s-meta">'+t.bottles.map(b=>BOTTLES[b].name).join(" · ")+'</div>'+
        (s?'<span class="s-score">✓</span>':"");
      el.onclick=()=>openTasting(t.n);
      trail.appendChild(el);
    });
  });

  // Smakprofil: snittbetyg per flaska
  const scores={};
  Object.values(state.sessions).forEach(sess=>{
    (sess.glasses||[]).forEach(g=>{
      if(g.rating>0 && g.bottle!=="x"){
        (scores[g.bottle]=scores[g.bottle]||[]).push(g.rating);
      }
    });
  });
  const entries=Object.entries(scores).map(([b,arr])=>({b,avg:arr.reduce((a,c)=>a+c,0)/arr.length,n:arr.length}))
    .sort((a,c)=>c.avg-a.avg);
  const prof=$("profile");
  if(entries.length===0){
    prof.innerHTML='<div class="prof-empty">Profilen byggs när du sparat din första provning.</div>';
  } else {
    prof.innerHTML=entries.map(e=>
      '<div class="prof-row"><span>'+BOTTLES[e.b].name+'</span>'+
      '<div class="prof-bar"><div style="width:'+(e.avg*10)+'%"></div></div>'+
      '<span class="prof-val">'+e.avg.toFixed(1)+'</span></div>').join("");
  }

  // Lärdomar
  const les=$("lessons");
  const done=TASTINGS.filter(t=>state.sessions[t.n]&&state.sessions[t.n].lesson);
  les.innerHTML=done.length?done.map(t=>
    '<div class="note-hist"><div class="nh-t">'+t.n+'. '+t.q+'</div>'+
    '<div class="nh-l">«'+esc(state.sessions[t.n].lesson)+'»</div></div>').join("")
    :'<div class="prof-empty" style="background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px">Här samlas en mening per kväll – vad du lärde dig.</div>';
}

function chip(b){
  return '<span class="b-chip"><span class="b-dot" style="background:radial-gradient(circle at 32% 28%,'+light(BOTTLES[b].color)+','+BOTTLES[b].color+' 65%)"></span>'+BOTTLES[b].name+'</span>';
}
function light(hex){const n=parseInt(hex.slice(1),16);
  return "rgb("+Math.min(255,(n>>16)+60)+","+Math.min(255,((n>>8)&255)+45)+","+Math.min(255,(n&255)+30)+")";}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

window.openTasting=function(n){
  current=TASTINGS.find(t=>t.n===n);
  const existing=state.sessions[n];
  draft=existing?JSON.parse(JSON.stringify(existing)):{
    glasses:current.bottles.map((b,i)=>({bottle:b,idx:i,nose:"",taste:"",finish:"",rating:0})),
    lesson:"",date:null
  };
  const ph=PHASES.find(p=>p.id===current.phase);
  let html='<div class="ov-top"><button class="back" onclick="closeTasting()">← Tillbaka</button></div>'+
    '<div class="t-phase" style="color:'+ph.color+'">'+ph.name+' · Provning '+current.n+'</div>'+
    '<h2 style="font-family:Libre Caslon Text,serif;font-size:24px;line-height:1.25;margin:8px 0 6px">'+current.q+'</h2>'+
    '<p style="font-size:14px;color:var(--paper-dim);margin-bottom:18px">'+current.why+'</p>';

  draft.glasses.forEach((g,i)=>{
    const b=BOTTLES[g.bottle];
    html+='<div class="glass-card">'+
      '<h3><span class="b-dot" style="width:24px;height:24px;background:radial-gradient(circle at 32% 28%,'+light(b.color)+','+b.color+' 65%)"></span>Glas '+(i+1)+' · '+b.name+'</h3>'+
      '<div class="field"><label>Doft – tre ord</label><input type="text" data-i="'+i+'" data-f="nose" value="'+esc(g.nose)+'" placeholder="t.ex. honung, äpple, vanilj"></div>'+
      '<div class="field"><label>Smak – tre ord</label><input type="text" data-i="'+i+'" data-f="taste" value="'+esc(g.taste)+'" placeholder="t.ex. päron, ek, peppar"></div>'+
      '<div class="field"><label>Eftersmak</label><div class="seg-row">'+
        ["Kort","Medel","Lång"].map(v=>'<button class="seg-btn'+(g.finish===v?" on":"")+'" data-i="'+i+'" data-v="'+v+'">'+v+'</button>').join("")+
      '</div></div>'+
      '<div class="field"><label>Betyg</label><div class="stars">'+
        Array.from({length:10},(_,k)=>'<button class="star'+(g.rating>=k+1?" on":"")+'" data-i="'+i+'" data-r="'+(k+1)+'">'+(k+1)+'</button>').join("")+
      '</div></div></div>';
  });

  html+='<div class="lesson"><h3>Kvällens lärdom</h3>'+
    '<div class="field"><label>En mening – vad lärde du dig?</label>'+
    '<textarea id="lessonField" placeholder="t.ex. Jag gillar rök mer när den har sötma bakom sig...">'+esc(draft.lesson)+'</textarea></div></div>';

  $("ovContent").innerHTML=html;
  bindOverlay();
  $("overlay").classList.add("open");
  window.scrollTo(0,0);
};

function bindOverlay(){
  $("ovContent").querySelectorAll("input[type=text]").forEach(inp=>{
    inp.addEventListener("input",()=>{draft.glasses[+inp.dataset.i][inp.dataset.f]=inp.value});
  });
  $("ovContent").querySelectorAll(".seg-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      draft.glasses[+btn.dataset.i].finish=btn.dataset.v;
      btn.parentElement.querySelectorAll(".seg-btn").forEach(x=>x.classList.remove("on"));
      btn.classList.add("on");
    });
  });
  $("ovContent").querySelectorAll(".star").forEach(st=>{
    st.addEventListener("click",()=>{
      const i=+st.dataset.i,r=+st.dataset.r;
      draft.glasses[i].rating=r;
      st.parentElement.querySelectorAll(".star").forEach(x=>{
        x.classList.toggle("on",+x.dataset.r<=r);
      });
    });
  });
  $("lessonField").addEventListener("input",e=>{draft.lesson=e.target.value});
}

window.closeTasting=function(){$("overlay").classList.remove("open");current=null};

$("saveBtn").addEventListener("click",()=>{
  if(!current)return;
  draft.date=new Date().toISOString().slice(0,10);
  state.sessions[current.n]=draft;
  save();
  closeTasting();
  render();
  const t=$("toast");t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
});

$("resetBtn").addEventListener("click",()=>{
  if(confirm("Radera alla provningar och anteckningar? Detta går inte att ångra.")){
    state={sessions:{}};save();render();
  }
});

render();
</script>
</body>
</html>
