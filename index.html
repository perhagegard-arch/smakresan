<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smakresan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Provningsprotokoll</div>
    <h1>Smakresan</h1>
    <p class="sub">En fråga i taget. Din gom, tränad.</p>
  </header>

  <div id="viewRoot"></div>

  <footer>Sparas lokalt i din webbläsare · Glencairn rekommenderas 🥃</footer>
</div>

<!-- Flikrad -->
<nav class="tabbar"><div class="inner">
  <button class="tab on" data-v="ikvall"><span class="ic">🥃</span>Ikväll</button>
  <button class="tab" data-v="resan"><span class="ic">🗺️</span>Resan</button>
  <button class="tab" data-v="hyllan"><span class="ic">🧴</span>Hyllan</button>
  <button class="tab" data-v="mastaren"><span class="ic">🎩</span>Mästaren</button>
</div></nav>

<!-- Overlay (provning, flaskor, blindläge m.m.) -->
<div class="overlay" id="overlay">
  <div class="ov-wrap" id="ovContent"></div>
  <div class="savebar" id="ovSavebar" style="display:none"><div class="inner"><button class="btn" id="saveBtn">Spara</button></div></div>
</div>
<div class="toast" id="toast">Sparat!</div>

<script src="data.js"></script>
<script src="ai.js"></script>
<script src="app.js"></script>
</body>
</html>
